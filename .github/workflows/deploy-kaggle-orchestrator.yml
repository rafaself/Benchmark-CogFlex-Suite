name: Deploy — Kaggle Orchestrator

# Convenience entrypoint for deploying dataset, notebook, or both in one
# trigger.  This workflow contains NO build, validation, or publish logic.
# All of that lives in the dedicated workflows it calls:
#
#   dataset  → .github/workflows/deploy-kaggle-dataset.yml
#   notebook → .github/workflows/deploy-kaggle-notebook.yml
#
# Those workflows remain the primary deployment path and can be triggered
# independently at any time.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        required: true
        type: choice
        options:
          - dataset
          - notebook
          - all
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production

# Prevent concurrent orchestrated deploys to the same environment.
# The called workflows enforce their own concurrency independently, so a
# direct trigger of a dedicated workflow is never blocked by this group.
concurrency:
  group: deploy-kaggle-orchestrator-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  # ── Dataset deployment ────────────────────────────────────────────────────────
  # Skipped when target=notebook.
  deploy-dataset:
    name: Dataset (${{ inputs.environment }})
    if: inputs.target == 'dataset' || inputs.target == 'all'
    uses: ./.github/workflows/deploy-kaggle-dataset.yml
    with:
      environment: ${{ inputs.environment }}
      dataset_id: "raptorengineer/ruleshift-runtime"
      dataset_title: "RuleShift Runtime"
      release_message: "Orchestrated release — environment=${{ inputs.environment }}"
    secrets:
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}

  # ── Notebook deployment ───────────────────────────────────────────────────────
  # When target=all: waits for deploy-dataset to succeed before starting.
  # When target=notebook: deploy-dataset is skipped; this job runs immediately.
  # GitHub treats a skipped job as satisfied for `needs` dependency purposes,
  # so the conditional needs entry is safe in both cases.
  deploy-notebook:
    name: Notebook (${{ inputs.environment }})
    if: inputs.target == 'notebook' || inputs.target == 'all'
    needs: [deploy-dataset]
    uses: ./.github/workflows/deploy-kaggle-notebook.yml
    with:
      environment: ${{ inputs.environment }}
      kernel_id: "raptorengineer/ruleshift-notebook-task"
      kernel_title: "RuleShift Notebook Task — Cognitive Flexibility Benchmark"
      runtime_dataset_slug: "raptorengineer/ruleshift-runtime"
    secrets:
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
